name: Build Android APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x BTHIDPro/gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      working-directory: BTHIDPro

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: BTHIDPro-debug-apk
        path: BTHIDPro/app/build/outputs/apk/debug/app-debug.apk
